<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tamurfood</title>
    <script>
      // Dark mode is scoped to the shop side. Apply the saved theme before
      // render (only on shop paths) to avoid a flash of the wrong theme.
      try {
        if (
          localStorage.getItem("theme") === "dark" &&
          location.pathname.startsWith("/shop")
        ) {
          document.documentElement.classList.add("dark");
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
